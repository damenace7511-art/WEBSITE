<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <title>Search Hub X</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-image: url("C:\Users\jsaya\OneDrive\Desktop\gaston-abascal-8F-6pXyQyLU-unsplash.jpg");
            background-size: cover; /* Makes it cover the whole screen */
            background-position: center; /* Centers the image */
            background-repeat: no-repeat; /* Prevents tiling */
        }
        /* ---------- General ---------- */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            text-align: center;
            transition: all 0.3s ease;
        }

            body.light {
                background-color: #fff;
                color: #000;
            }

        /* ---------- Header ---------- */
        h1 {
            margin-top: 20px;
        }

        /* ---------- Buttons ---------- */
        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

            button:hover {
                background-color: #00ffcc;
                color: black;
                box-shadow: 0 4px 12px rgba(0,255,200,0.5);
                transform: translateY(-2px);
            }

        body.dark button {
            background-color: #1f1f1f;
            color: white;
        }

        body.light button {
            background-color: #e0e0e0;
            color: black;
        }

        /* ---------- Input ---------- */
        input {
            padding: 12px;
            width: 250px;
            border-radius: 12px;
            border: 2px solid rgba(0,255,200,0.5);
            outline: none;
            font-size: 16px;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

            input:focus {
                border-color: #00ffcc;
                box-shadow: 0 0 10px rgba(0,255,200,0.7);
            }

        /* ---------- Menu ---------- */
        .menu {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }

        .dropdown {
            position: relative;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 50px;
            left: 0;
            background-color: #1f1f1f;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,255,200,0.4);
            min-width: 200px;
            animation: fadeIn 0.3s ease;
            z-index: 999;
            text-align: left;
        }

            .dropdown-content button {
                display: block;
                width: 100%;
                margin: 5px 0;
                transition: all 0.2s ease;
            }

                .dropdown-content button:hover {
                    background-color: #00ffcc;
                    color: black;
                    transform: scale(1.05);
                }

        /* ---------- Output ---------- */
        #output {
            margin-top: 30px;
        }

        h3 {
            color: #00ffcc;
            margin-top: 25px;
        }

        h4 {
            color: gray;
            margin-top: 15px;
        }

        a {
            color: #00ffcc;
            text-decoration: none;
        }

        /* ---------- Footer ---------- */
        footer {
            margin-top: 40px;
            padding: 10px;
            font-size: 14px;
            color: gray;
        }

        /* ---------- Animations ---------- */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---------- Mobile Responsiveness ---------- */
        @media screen and (max-width: 600px) {
            .menu {
                flex-direction: column;
                gap: 10px;
            }

            input {
                width: 90%;
            }

            .dropdown-content {
                position: static;
                min-width: auto;
                margin-top: 5px;
            }
        }
    </style>
</head>
<body class="dark">

    <h1>🔍 Search Hub X</h1>

    <!-- Top Buttons -->
    <div style="margin:10px 0;">
        <button onclick="toggleMode()">🌙 / ☀️</button>
        <button onclick="toggleLite()">Lite Mode 🔎</button>
    </div>

    <!-- Search -->
    <input type="text" id="searchBox" placeholder="Search anything...">
    <button onclick="liteOn ? liteSearch() : search()">Search</button>

    <!-- Menus -->
    <div class="menu" id="menuContainer">
        <!-- Music -->
        <div class="dropdown">
            <button onclick="toggleDropdown('musicMenu')">🎵 Music ▼</button>
            <div id="musicMenu" class="dropdown-content">
                <button onclick="window.open('https://www.youtube.com')">YouTube</button>
                <button onclick="window.open('https://open.spotify.com')">Spotify</button>
                <button onclick="window.open('https://soundcloud.com')">SoundCloud</button>
                <button onclick="window.open('https://pagalworld.is')">Pagalworld</button>
                <button onclick="window.open('https://in.www-y2mate.com/')">Y2Mate</button>
            </div>
        </div>

        <!-- Movies -->
        <div class="dropdown">
            <button onclick="toggleDropdown('movieMenu')">🎬 Movies ▼</button>
            <div id="movieMenu" class="dropdown-content">
                <button onclick="window.open('https://vegamovies.audio')">Vegamovies</button>
                <button onclick="window.open('https://netmirror.gg/2/en')">NetMirror</button>
            </div>
        </div>

        <!-- Games -->
        <div class="dropdown">
            <button onclick="toggleDropdown('gameMenu')">🎮 Games ▼</button>
            <div id="gameMenu" class="dropdown-content">
                <button onclick="window.open('https://store.steampowered.com')">Steam</button>
                <button onclick="window.open('https://store.epicgames.com')">Epic Games</button>
                <button onclick="window.open('https://fitgirl-repacks.site')">FitGirl</button>
                <button onclick="window.open('https://www.google.com/search?q=Repack+Games', '_blank')">Repack Games</button>
                <button onclick="window.open('https://www.google.com/search?q=SteamUnlocked', '_blank')">SteamUnlocked</button>
            </div>
        </div>

        <!-- Explore -->
        <div class="dropdown">
            <button onclick="toggleDropdown('exploreMenu')">🔍 Explore ▼</button>
            <div id="exploreMenu" class="dropdown-content">
                <h4>Main</h4>
                <button onclick="window.open('https://news.google.com')">News</button>
                <button onclick="window.open('https://www.google.com/imghp')">Images</button>
                <button onclick="window.open('https://www.nseindia.com')">Stock Market</button>
                <button onclick="window.open('https://trends.google.com')">Trends</button>

                <h4>Social Media</h4>
                <button onclick="window.open('https://www.instagram.com')">Instagram</button>
                <button onclick="window.open('https://www.facebook.com')">Facebook</button>
                <button onclick="window.open('https://www.tiktok.com')">TikTok</button>
                <button onclick="window.open('https://twitter.com')">Twitter</button>

                <h4>Search Engines</h4>
                <button onclick="window.open('https://www.google.com')">Google</button>
                <button onclick="window.open('https://www.brave.com')">Brave</button>
                <button onclick="window.open('https://www.microsoft.com/edge')">Edge</button>
                <button onclick="window.open('https://duckduckgo.com')">DuckDuckGo</button>
            </div>
        </div>
    </div>

    <!-- Output -->
    <div id="output"></div>

    <!-- Footer -->
    <footer>© Property of Kshitij Joshi™</footer>

    <script>
        // ---------- Dropdown Toggle ----------
        function toggleDropdown(id) {
            let menu = document.getElementById(id);
            document.querySelectorAll(".dropdown-content").forEach(d => {
                if (d.id !== id) d.style.display = 'none';
            });
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        // ---------- Dark/Light Mode ----------
        function toggleMode() {
            document.body.classList.toggle("light");
            document.body.classList.toggle("dark");
        }

        // ---------- Lite Mode ----------
        let liteOn = false;
        function toggleLite() {
            liteOn = !liteOn;
            const elementsToToggle = document.querySelectorAll('.menu, #output');
            const sb = document.getElementById('searchBox');
            if (liteOn) {
                elementsToToggle.forEach(el => el.style.display = 'none');
                sb.style.width = '90%';
            } else {
                elementsToToggle.forEach(el => el.style.display = 'flex');
                sb.style.width = '250px';
            }
        }

        // ---------- Lite Search ----------
        function liteSearch() {
            let query = document.getElementById('searchBox').value;
            if (!query) { alert('Enter something to search!'); return; }
            window.open(`https://www.google.com/search?q=${query}`, '_blank');
        }

        // ---------- Normal Search ----------
        function search() {
            let query = document.getElementById("searchBox").value;
            if (!query) { alert('Enter something to search!'); return; }

            let output = "<h2>Results</h2>";

            // Images
            output += `<h3>📸 Images</h3>
        <a href="https://www.google.com/search?tbm=isch&q=${query}" target="_blank">View images of "${query}"</a>`;

            // Movies
            output += `<h3>🎬 Movies</h3>
        <button onclick="window.open('https://www.google.com/search?q=${query}+site:vegamovies.audio','_blank')">Vegamovies</button>
        <button onclick="window.open('https://www.google.com/search?q=${query}+site:netmirror.gg','_blank')">NetMirror</button>
        <p style="color:gray;">⚠️ may require login or redirects</p>`;

            // Music
            output += `<h3>🎵 Music</h3><h4>🎧 Streaming</h4>
        <button onclick="window.open('https://www.youtube.com/results?search_query=${query}','_blank')">YouTube</button>
        <button onclick="window.open('https://open.spotify.com/search/${query}','_blank')">Spotify</button>
        <button onclick="window.open('https://soundcloud.com/search?q=${query}','_blank')">SoundCloud</button>
        <button onclick="window.open('https://music.apple.com/search?term=${query}','_blank')">Apple Music</button>
        <button onclick="window.open('https://www.jiosaavn.com/search/${query}','_blank')">JioSaavn</button>
        <h4>⬇️ Download</h4>
        <button onclick="window.open('https://www.google.com/search?q=${query}+site:pagalworld.is','_blank')">Pagalworld</button>
        <button onclick="window.open('https://in.www-y2mate.com/','_blank')">Y2Mate</button>`;

            // Games
            output += `<h3>🎮 Games</h3>
        <button onclick="window.open('https://store.steampowered.com/search/?term=${query}','_blank')">Steam</button>
        <button onclick="window.open('https://store.epicgames.com/en-US/browse?q=${query}','_blank')">Epic Games</button>
        <button onclick="window.open('https://www.google.com/search?q=${query}+site:fitgirl-repacks.site','_blank')">FitGirl</button>
        <button onclick="window.open('https://www.google.com/search?q=${query}+site:repack-games.com','_blank')">Repack Games</button>
        <button onclick="window.open('https://www.google.com/search?q=${query}+site:steamunlocked.org','_blank')">SteamUnlocked</button>`;

            document.getElementById("output").innerHTML = output;
        }
    </script>
</body>
</html>
